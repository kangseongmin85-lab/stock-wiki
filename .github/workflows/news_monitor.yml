name: 📰 주식 뉴스 모니터링

on:
  schedule:
    # 24시간 매일 5분 간격 (정시 회피 — 2,7,12,17... 분에 트리거)
    - cron: '2-59/5 * * * *'
    # 일일 요약 (UTC 23:50 = KST 08:50, 매일)
    - cron: '50 23 * * *'
    # 장 마감 브리핑 (UTC 07:30 = KST 16:30, 매일)
    - cron: '30 7 * * *'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install python-dotenv

      - name: seen_ids 디렉토리 생성
        run: mkdir -p wiki/news

      - name: seen_ids 캐시 복원/저장 (자동)
        uses: actions/cache@v4
        with:
          path: wiki/news/seen_ids.json
          key: seen-ids-${{ runner.os }}-${{ hashFiles('wiki/news/seen_ids.json') }}
          restore-keys: |
            seen-ids-${{ runner.os }}-
            seen-ids-

      - name: 뉴스 수집 및 텔레그램 전송
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          DART_API_KEY:          ${{ secrets.DART_API_KEY }}
          NOTION_TOKEN:          ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:          ${{ secrets.NOTION_DB_ID }}
          NAVER_CLIENT_ID:       ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:   ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          if [ "$HOUR" = "23" ] && [ "$MIN" = "50" ]; then
            python fetch_news.py --digest
          else
            python fetch_news.py
          fi

      - name: 장 마감 브리핑 (KST 16:30)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          # UTC 07:30 = KST 16:30 에만 실행
          if [ "$HOUR" = "7" ] && [ "$MIN" = "30" ]; then
            python fetch_briefing.py
          fi

      - name: seen_ids 캐시 갱신 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: wiki/news/see